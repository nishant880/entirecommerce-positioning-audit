<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="-apple-system, 'Poppins', 'Inter', sans-serif">
  <!-- Background -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#75e9d2" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#75e9d2" stop-opacity="0.00"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111119"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="#08080d"/>
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Top label -->
  <text x="540" y="96" text-anchor="middle" fill="#75e9d2" font-size="20" font-weight="600" letter-spacing="4" font-family="'Poppins', sans-serif">FREE FOR FOUNDER-LED DTC BRANDS</text>

  <!-- Title -->
  <text x="540" y="170" text-anchor="middle" fill="#ffffff" font-size="78" font-weight="800" font-family="'Montserrat', sans-serif" letter-spacing="-2">AI Positioning Audit</text>

  <!-- Subtitle -->
  <text x="540" y="220" text-anchor="middle" fill="#9494ad" font-size="24" font-weight="400">Ten deliverables. Three-way synthesis. Delivered in 30 minutes.</text>

  <!-- 10 cards: 2 cols × 5 rows -->
  <g font-family="'Poppins', sans-serif">
    <!-- 01 Founder Vision -->
    <g transform="translate(40 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">01 · FOUNDER VISION</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">The biggest-lever belief plus constraints</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">12-month goal · product origin · what you have tried</text>
    </g>

    <!-- 02 Current Messaging Audit -->
    <g transform="translate(560 270)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">02 · MESSAGING AUDIT</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">What your brand says across every surface</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Homepage · product pages · ads · social · email · About</text>
    </g>

    <!-- 03 Audience Insights -->
    <g transform="translate(40 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">03 · AUDIENCE INSIGHTS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">The words your buyers use in their own voice</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">15 quotes · Reddit, X, Quora, forums · tension, objections</text>
    </g>

    <!-- 04 Competitor Positioning Scan -->
    <g transform="translate(560 396)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">04 · COMPETITOR SCAN</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">How 3-5 rivals claim their territory</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">H1 · subhead · hero · tone of voice · visual identity</text>
    </g>

    <!-- 05 Positioning Map -->
    <g transform="translate(40 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">05 · POSITIONING MAP</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Where every competitor sits on two axes</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">2x2 grid on the category-defining dimensions</text>
    </g>

    <!-- 06 Overlap + Whitespace -->
    <g transform="translate(560 522)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">06 · OVERLAP + WHITESPACE</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Commodity ground plus territory nobody owns</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Where you match rivals · where demand outstrips supply</text>
    </g>

    <!-- 07 Misalignment Diagnosis -->
    <g transform="translate(40 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">07 · MISALIGNMENT MAP</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Where your words drift from buyer language</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Founder vision · site copy · ad creative · buyer voice</text>
    </g>

    <!-- 08 Three Positioning Options -->
    <g transform="translate(560 648)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">08 · THREE POSITIONING OPTIONS</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Safe, Bold, Bet-the-brand messaging systems</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Headline · subhead · promises · objections · ad copy</text>
    </g>

    <!-- 09 Rollout Sequence -->
    <g transform="translate(40 774)">
      <rect width="480" height="112" rx="14" fill="url(#cardGrad)" stroke="#1a1a24" stroke-width="1"/>
      <text x="24" y="40" fill="#75e9d2" font-size="14" font-weight="700" letter-spacing="3">09 · ROLLOUT SEQUENCE</text>
      <text x="24" y="74" fill="#ffffff" font-size="22" font-weight="600">Which surfaces to update and in what order</text>
      <text x="24" y="98" fill="#9494ad" font-size="15">Homepage · ads · social · email · test before commit</text>
    </g>

    <!-- 10 Three-way Synthesis -->
    <g transform="translate(560 774)">
      <rect width="480" height="112" rx="14" fill="#75e9d2" stroke="#75e9d2" stroke-width="1"/>
      <text x="24" y="40" fill="#08080d" font-size="14" font-weight="700" letter-spacing="3">10 · THREE-WAY SYNTHESIS</text>
      <text x="24" y="74" fill="#08080d" font-size="22" font-weight="700">The positioning territory only you can own</text>
      <text x="24" y="98" fill="#08080d" font-size="15" opacity="0.80">Audience language × competitor whitespace × founder conviction</text>
    </g>
  </g>

  <!-- Bottom bar: URL + CTA -->
  <g transform="translate(0 924)">
    <line x1="40" y1="0" x2="1040" y2="0" stroke="#1a1a24" stroke-width="1"/>
    <text x="40" y="54" fill="#9494ad" font-size="20" font-weight="500">Delivered as one Word doc plus markdown source in your GitHub repo.</text>
    <text x="40" y="104" fill="#ffffff" font-size="36" font-weight="700" font-family="'Montserrat', sans-serif" letter-spacing="-0.5">entir<tspan fill="#75e9d2">ecommerce.ai</tspan><tspan fill="#9494ad">/playbooks/positioning-audit</tspan></text>
  </g>
</svg>
